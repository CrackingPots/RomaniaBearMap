<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hartă Urși România - Monitorizare și Alerte</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Overlay Menu -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>BearTracker <span>RO</span></h1>
                <p>Monitorizare prezență urși în timp real (Static Demo)</p>
            </div>
            
            <div class="stats-container">
                <div class="stat-box alert">
                    <span class="stat-value" id="ro-alert-count">0</span>
                    <span class="stat-label">Alerte RO-ALERT</span>
                </div>
                <div class="stat-box report">
                    <span class="stat-value" id="user-report-count">0</span>
                    <span class="stat-label">Raportări Comunitate</span>
                </div>
            </div>

            <div class="legend">
                <h3>Legendă Hartă</h3>
                <div class="legend-item">
                    <span class="legend-icon alert-icon">🚨</span>
                    <span>RO-ALERT</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon report-icon">🐻</span>
                    <span>Raportare Utilizator</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon heatmap-color"></span>
                    <span>Zonă Risc (Heatmap)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-icon" style="color: #ff7800; font-size: 1.4rem;">⬟</span>
                    <span>Habitat (ArcGIS Live)</span>
                </div>
            </div>

            <div class="actions">
                <button id="btn-add-report" class="btn-primary">Adaugă Observație</button>
                <button id="btn-generate-mock" class="btn-secondary">Șterge Date Locale</button>
            </div>
        </aside>

        <!-- Map Container -->
        <main class="map-wrapper">
            <div id="map"></div>
        </main>

        <!-- Modal Form (Hidden by default) -->
        <div id="report-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>Raportează prezența unui urs</h2>
                <p class="modal-subtitle">Dă click pe hartă pentru a selecta locația.</p>
                
                <form id="report-form" class="hidden">
                    <div class="form-group">
                        <label>Coordonate selectate:</label>
                        <input type="text" id="report-coords" readonly>
                    </div>
                    <div class="form-group">
                        <label>Tip observație:</label>
                        <select id="report-type" required>
                            <option value="urs_observat">Urs observat direct</option>
                            <option value="urme">Urme / Excremente</option>
                            <option value="pagube">Pagube materiale / animale</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Detalii suplimentare:</label>
                        <textarea id="report-details" rows="3" placeholder="Ex: Câți urși, comportament, direcție..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary w-100">Salvează Local</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet.heat plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
