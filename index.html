<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hartă Urși România - Monitorizare și Alerte</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Overlay Menu -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>BearTracker <span>RO</span></h1>
                <p>Monitorizare prezență urși în timp real (Static Demo)</p>
            </div>
            
            <div class="stats-container">
                <div class="stat-box alert" style="width: 100%;">
                    <span class="stat-value" id="ro-alert-count">0</span>
                    <span class="stat-label">Alerte Confirmate</span>
                </div>
            </div>

            <div class="legend">
                <h3>Legendă Hartă</h3>
                <div class="legend-item">
                    <span class="legend-icon alert-icon">🚨</span>
                    <span>RO-ALERT</span>
                </div>

                <div class="legend-item">
                    <span class="legend-icon heatmap-color"></span>
                    <span>Zonă Risc (Heatmap)</span>
                </div>
                
                <details class="ecological-network-details" open>
                    <summary class="ecological-network-summary">Rețea Ecologică Carpați</summary>
                    <div class="ecological-network-content">
                        <label class="legend-item toggleable"><input type="checkbox" checked class="habitat-toggle" data-code="11"><span class="legend-icon" style="background: rgba(0,128,0,0.6); border: 2px solid #008000; border-radius: 2px;"></span><span>Habitat favorabil continuu</span></label>
                        <label class="legend-item toggleable"><input type="checkbox" checked class="habitat-toggle" data-code="12"><span class="legend-icon" style="background: rgba(0,214,0,0.6); border: 2px solid #00d600; border-radius: 2px;"></span><span>Alte zone favorabile</span></label>
                        <label class="legend-item toggleable"><input type="checkbox" checked class="habitat-toggle" data-code="21"><span class="legend-icon" style="background: rgba(0,112,255,0.6); border: 2px solid #0070ff; border-radius: 2px;"></span><span>Arie de legătură</span></label>
                        <label class="legend-item toggleable"><input type="checkbox" checked class="habitat-toggle" data-code="22"><span class="legend-icon" style="background: rgba(0,169,230,0.6); border: 2px solid #00a9e6; border-radius: 2px;"></span><span>Coridor ecologic</span></label>
                        <label class="legend-item toggleable"><input type="checkbox" checked class="habitat-toggle" data-code="23"><span class="legend-icon" style="background: rgba(0,38,145,0.6); border: 2px solid #002691; border-radius: 2px;"></span><span>Stepping stone</span></label>
                        <label class="legend-item toggleable"><input type="checkbox" checked class="habitat-toggle" data-code="32"><span class="legend-icon" style="background: rgba(255,170,0,0.6); border: 2px solid #ffaa00; border-radius: 2px;"></span><span>Sector critic conectivitate</span></label>
                        <label class="legend-item toggleable"><input type="checkbox" checked class="habitat-toggle" data-code="31"><span class="legend-icon" style="background: rgba(255,0,0,0.6); border: 2px solid #ff0000; border-radius: 2px;"></span><span>Arie critică conectivitate</span></label>
                    </div>
                </details>
            </div>


        </aside>

        <!-- Map Container -->
        <main class="map-wrapper">
            <div id="map"></div>
        </main>

    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <!-- Leaflet.heat plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
